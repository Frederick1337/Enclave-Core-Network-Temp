name: Project Enclave Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    name: Windows User-Space Validity Validation
    runs-on: windows-latest

    steps:
      # Step 1: Pull the latest source code repository down onto the virtual runner drive
      - name: Checkout Code Repository Base Tree
        uses: actions/checkout@v4

      # Step 2: Automatically pull, isolate, and register NASM straight to the runner's PATH variable
      - name: Set up Netwide Assembler (NASM)
        uses: ilammy/setup-nasm@v1

      # Step 3: Run CMake to parse the project source tree and generate valid Ninja build files
      - name: Configure CMake Simulation Targets
        run: |
          mkdir build_win
          cd build_win
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release ..

      # Step 4: Execute the compiler sweep to build the target simulation binary package
      - name: Execute Compiler Build Sweep
        run: |
          cd build_win
          cmake --build . --config Release
