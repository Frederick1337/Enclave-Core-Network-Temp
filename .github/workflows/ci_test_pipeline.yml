name: Enclave Hardware Verification CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-infrastructure:
    runs-on: ubuntu-latest

    steps:
    # FIXED DEPRECATION WARNING: Upgraded checkout sequence to native v4 (Node 24 compliant)
    - name: Checkout Source Code Tree
      uses: actions/checkout@v4

    - name: Install Netwide Assembler (NASM) and Core Compilation Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm cmake build-essential python3

    - name: Execute Multi-Target Toolchain Compilation
      run: |
        chmod +x build_all.sh
        ./build_all.sh

    - name: Validate Local Linux Driver Build Scripts
      run: |
        chmod +x src/core/driver_build_suite.sh
        # Verify the syntax of the build suite script without executing on host headers
        bash -n src/core/driver_build_suite.sh

    - name: Run Automated Environmental Attestation and Diagnostic Stress Test
      run: |
        chmod +x tests/hardware_diagnostic_pipeline.py
        python3 tests/hardware_diagnostic_pipeline.py
