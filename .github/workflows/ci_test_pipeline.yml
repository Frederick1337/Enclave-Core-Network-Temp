name: Project Enclave Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    name: Windows User-Space Validity Validation
    runs-on: windows-latest

    steps:
      - name: Checkout Code Repository Base Tree
        uses: actions/checkout@v4

      - name: Set up Netwide Assembler (NASM)
        uses: ilammy/setup-nasm@v1

      # Automatically finds and configures the native MSVC compiler tools (cl.exe) in the cloud
      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      # Force CMake to select the native MSVC compiler tools and ignore MinGW allocations
      - name: Configure CMake Simulation Targets
        shell: cmd
        run: |
          if exist build_win rmdir /s /q build_win
          mkdir build_win
          cd build_win
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl ..

      - name: Execute Windows Compiler Build Sweep
        shell: cmd
        run: |
          cd build_win
          cmake --build . --config Release

  build-linux:
    name: Linux User-Space Validity Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository Base Tree
        uses: actions/checkout@v4

      # Install bare-metal native linux build essentials and nasm packages out-of-band
      - name: Install System Toolchain Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake nasm

      - name: Configure CMake Simulation Targets
        run: |
          if [ -d "build_linux" ]; then rm -rf build_linux; fi
          mkdir build_linux
          cd build_linux
          cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Execute Linux Compiler Build Sweep
        run: |
          cd build_linux
          cmake --build . --config Release
